# This file was generated by KACE (Klipper Automated Configuration Ecosystem)
# Board: generic-melzi.cfg
# Kinematics: cartesian
# Stepper Drivers: A4988 (Standalone)
# Probe: None
# Z Motors: 1

# --------------------------------------------------
# Includes
# --------------------------------------------------
[include mainsail.cfg]


# --------------------------------------------------
# MCU
# --------------------------------------------------
[mcu]
serial: /dev/serial/by-id/usb-Klipper_atmega1284p_Melzi-if00 # Conexión serial a la placa controladora. Auto-detectado por KACE. Verifica en /dev/serial/by-id/ si falla.

# --------------------------------------------------
# Printer
# --------------------------------------------------
[printer]
kinematics: cartesian                           # Tipo de cinemática de la impresora (cartesiana, corexy, delta)
max_velocity: 300                               # Velocidad máxima (en mm/s) del cabezal
max_accel: 3000                                 # Aceleración máxima (en mm/s^2) del cabezal
max_z_velocity: 5                               # Velocidad máxima (en mm/s) del movimiento en el eje Z
max_z_accel: 100                                # Aceleración máxima (en mm/s^2) en el eje Z

# --------------------------------------------------
# Steppers
# --------------------------------------------------
[stepper_x]
step_pin: PD7                                   # Pin de paso (step) para el motor X
dir_pin: !PC5                                   # Pin de dirección (dir). Agrega o quita "!" para invertir la dirección
enable_pin: !PD6                                # Pin de habilitación (enable) del motor
microsteps: 16                                  # Número de micropasos por paso completo
rotation_distance: 32                           # Distancia en mm que viaja el eje por cada rotación completa del motor
endstop_pin: ^!PC2                              # Pin de fin de carrera. Agrega o quita "!" para invertir la lógica
position_endstop: -30                           # Ubicación del fin de carrera (generalmente 0)
position_min: -30                               # Minimum valid X position
position_max: 300                               # Posición máxima válida en X
homing_speed: 50                                # Velocidad máxima (en mm/s) del motor al hacer homing

[stepper_y]
step_pin: PC6                                   # Pin de paso (step) para el motor Y
dir_pin: !PC7                                   # Pin de dirección (dir). Agrega o quita "!" para invertir la dirección
enable_pin: !PD6                                # Pin de habilitación (enable) del motor
microsteps: 16                                  # Número de micropasos por paso completo
rotation_distance: 32                           # Distancia en mm que viaja el eje por cada rotación completa del motor
endstop_pin: ^!PC3                              # Pin de fin de carrera. Agrega o quita "!" para invertir la lógica
position_endstop: -8                            # Ubicación del fin de carrera (generalmente 0)
position_min: -8                                # Minimum valid Y position
position_max: 300                               # Posición máxima válida en Y
homing_speed: 50                                # Velocidad máxima (en mm/s) del motor al hacer homing

[stepper_z]
step_pin: PB3                                   # Pin de paso (step) para el motor Z
dir_pin: !PB2                                   # Pin de dirección (dir). Agrega o quita "!" para invertir la dirección
enable_pin: !PA5                                # Pin de habilitación (enable) del motor
microsteps: 16                                  # Número de micropasos por paso completo
rotation_distance: 8                            # Distancia en mm que viaja el eje por cada rotación completa del motor
endstop_pin: ^!PC4                              # Pin de fin de carrera. Agrega o quita "!" para invertir la lógica
position_endstop: 0.5                           # Ubicación del fin de carrera (generalmente 0)
position_min: 0.5                               # Minimum valid Z position
position_max: 350                               # Posición máxima válida en Z

[extruder]
step_pin: PB1                                   # Pin de paso (step) para el extrusor
dir_pin: PB0                                    # Pin de dirección (dir). Agrega o quita "!" para invertir la dirección
enable_pin: !PD6                                # Pin de habilitación (enable) del motor
heater_pin: PD5                                 # Pin conectado al cartucho calentador del hotend
sensor_pin: PA7                                 # Pin conectado al termistor del hotend
microsteps: 16                                  # Número de micropasos por paso completo
rotation_distance: 33.6                         # filamento por revolución del motor (mm) --- configuración manual --- (calibrar extruyendo 100mm)
nozzle_diameter: 0.400                          # Diámetro de la boquilla instalada en mm
filament_diameter: 1.750                        # Diámetro del filamento que se está utilizando
sensor_type: Generic 3950                       # Tipo de termistor utilizado para el hotend
control: pid                                    # Algoritmo de control de temperatura
pid_Kp: 22.2                                    # PID proporcional --- configuración manual --- (ejecutar PID_CALIBRATE HEATER=extruder TARGET=200)
pid_Ki: 1.08                                    # PID integral --- configuración manual --- (ejecutar PID_CALIBRATE)
pid_Kd: 114                                     # PID derivativo --- configuración manual --- (ejecutar PID_CALIBRATE)
min_temp: 0                                     # Temperatura mínima segura
max_temp: 250                                   # Temperatura máxima segura

# --------------------------------------------------
# Probe & Bed Leveling
# --------------------------------------------------

# --------------------------------------------------
# Part Cooling Fan
# --------------------------------------------------
[fan]
pin: PB4                                        # Pin connected to the part cooling fan

# --------------------------------------------------
# Heated Bed
# --------------------------------------------------
[heater_bed]
heater_pin: PD4                                 # Pin conectado al relé de estado sólido o MOSFET de la cama caliente
sensor_pin: PA6                                 # Pin conectado al termistor de la cama caliente
sensor_type: Generic 3950                       # Tipo de termistor utilizado para la cama caliente
control: pid                                    # Algoritmo de control de temperatura
pid_Kp: 54.027                                  # PID proporcional de la cama --- configuración manual --- (ejecutar PID_CALIBRATE HEATER=heater_bed TARGET=60)
pid_Ki: 0.770                                   # PID integral de la cama --- configuración manual --- (ejecutar PID_CALIBRATE)
pid_Kd: 948.182                                 # PID derivativo de la cama --- configuración manual --- (ejecutar PID_CALIBRATE)
min_temp: 0                                     # Temperatura mínima segura
max_temp: 130                                   # Temperatura máxima segura

