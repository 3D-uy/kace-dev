# ==================================================
# DISPLAY HARDWARE SECTIONS
# ==================================================
# ============================================================
# DISPLAY: DISPLAY
# Compatibility: FULLY_COMPATIBLE
# Selected by user during KACE display setup wizard
# Note: Standard 12864 graphic and character LCDs are natively supported by Klipper
# Note: Officially registered in Klipper's LCD_chips driver registry (display.py)
# Note: Covers: RepRapDiscount Smart LCD (st7920), mini12864 (uc1701), HD44780 (2004)
# Note: Connects via standard EXP1/EXP2 10-pin ribbon headers
# Note: Most RepRap LCDs are 3.3V-tolerant — safe with STM32 and LPC176x boards
# Note: Verify ribbon connector orientation — reversed EXP cables destroy GPIO
# ============================================================
[display]
lcd_type: st7920
cs_pin: PA4
sclk_pin: PA1
sid_pin: PA3
encoder_pins: ^PD2, ^PD3
click_pin: ^!PC0
