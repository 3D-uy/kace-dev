name: KACE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same branch/PR when new commits are pushed.
# Keeps CI queues clean and saves runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  # ── Stage 1: Syntax check ────────────────────────────────────────────────────
  lint:
    name: Lint (syntax check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check syntax of all Python files
        run: |
          echo "Checking Python syntax..."
          find . -name "*.py" \
            -not -path "./__pycache__/*" \
            -not -path "./.git/*" \
            | sort \
            | xargs python3 -m py_compile
          echo "All Python files passed syntax check."

  # ── Stage 2: Unit tests ──────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python3 tests/run_tests.py --verbose

  # ── Stage 3: YAML integrity ──────────────────────────────────────────────────
  yaml-integrity:
    name: YAML Integrity Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate boards.yaml schema and pattern precedence
        run: python3 tests/run_tests.py --yaml-check

  # ── Stage 4: Snapshot regression gate ───────────────────────────────────────
  # Explicitly blocks merge if any snapshot differs from the golden fixture.
  regression-tests:
    name: Snapshot Regression Gate
    runs-on: ubuntu-latest
    needs: [unit-tests, yaml-integrity]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run snapshot regression tests
        # KACE_UPDATE_SNAPSHOTS must never be set in CI.
        # Any mismatch between generated output and the golden fixture is a
        # hard failure — this is the primary merge protection gate.
        run: |
          unset KACE_UPDATE_SNAPSHOTS
          python3 tests/run_tests.py --verbose
        env:
          KACE_UPDATE_SNAPSHOTS: ""

  # ── Stage 5: Full Klipper sweep (main only) ──────────────────────────────────
  # Skipped on PRs — runs only on push/merge to main.
  # This keeps contributor PRs fast while guaranteeing full upstream
  # compatibility validation on every commit that lands on main.
  #
  # Future: add workflow_dispatch to allow maintainers to trigger the sweep
  # manually on selected PRs (e.g. when touching parser/template logic).
  full-klipper-sweep:
    name: Full Klipper Config Sweep (192+ configs)
    runs-on: ubuntu-latest
    needs: regression-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git identity (required for sparse clone)
        run: |
          git config --global user.email "ci@kace"
          git config --global user.name "KACE CI"

      - name: Run full Klipper config sweep
        run: python3 tests/run_tests.py --full-klipper-sweep --verbose

  # ── Stage 6: Docker LPC1769 Firmware Build ───────────────────────────────────
  docker-firmware-build:
    name: Docker MCU Firmware Builds (LPC1769, STM32, RP2040, AVR)
    runs-on: ubuntu-latest
    needs: regression-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker validation image
        run: |
          docker build -f docker/Dockerfile -t kace-dev .

      - name: Run MCU firmware build tests in Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace kace-dev python3 -m unittest tests/regression/test_mcu_builds.py -v
